name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r dev-requirements.txt
      - name: Repository hygiene guard
        run: |
          chmod +x scripts/check_repo_hygiene.sh
          ./scripts/check_repo_hygiene.sh
      - name: Run tests
        run: |
          pytest -q
      - name: Full-stack startup validation
        run: |
          python scripts/validate_full_stack.py

  startup-validation-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r dev-requirements.txt
      - name: Full-stack startup validation
        run: |
          python scripts/validate_full_stack.py
