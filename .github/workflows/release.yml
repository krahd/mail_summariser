name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-backend:
    name: Build backend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: arm64
            binary_ext: ""
          - os: ubuntu-latest
            platform: linux
            arch: x64
            binary_ext: ""
          - os: windows-latest
            platform: windows
            arch: x64
            binary_ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Static validation
        run: python -m compileall backend

      - name: Build backend binary
        run: |
          python scripts/build_backend_binary.py --platform "${{ matrix.platform }}" --arch "${{ matrix.arch }}"

      - name: Package backend artifact (unix)
        if: matrix.platform != 'windows'
        run: |
          python scripts/package_backend_release.py \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.arch }}" \
            --input "dist/mail-summariser-backend-${{ matrix.platform }}-${{ matrix.arch }}"

      - name: Package backend artifact (windows)
        if: matrix.platform == 'windows'
        run: |
          python scripts/package_backend_release.py --platform "${{ matrix.platform }}" --arch "${{ matrix.arch }}" --input "dist/mail-summariser-backend-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.binary_ext }}"

      - name: Smoke test backend binary (unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          BIN="dist/mail-summariser-backend-${{ matrix.platform }}-${{ matrix.arch }}"
          "$BIN" --host 127.0.0.1 --port 8766 > /tmp/backend.log 2>&1 &
          PID=$!
          for i in {1..20}; do
            if curl -fsS "http://127.0.0.1:8766/health" >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS "http://127.0.0.1:8766/health"
          kill "$PID"

      - name: Smoke test backend binary (windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $bin = "dist/mail-summariser-backend-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.binary_ext }}"
          $process = Start-Process -FilePath $bin -ArgumentList "--host", "127.0.0.1", "--port", "8766" -PassThru
          $ok = $false
          for ($i = 0; $i -lt 30; $i++) {
            try {
              Invoke-WebRequest -Uri "http://127.0.0.1:8766/health" -UseBasicParsing | Out-Null
              $ok = $true
              break
            } catch {
              Start-Sleep -Seconds 1
            }
          }
          if (-not $ok) {
            Stop-Process -Id $process.Id -Force
            throw "Windows binary did not pass health smoke test"
          }
          Invoke-WebRequest -Uri "http://127.0.0.1:8766/health" -UseBasicParsing | Out-Null
          Stop-Process -Id $process.Id -Force

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/mail-summariser-backend-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.binary_ext }}
            dist/packages/mail-summariser-backend-${{ matrix.platform }}-${{ matrix.arch }}*

  build-macos-app:
    name: Build macOS app
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app archive
        run: |
          chmod +x scripts/build_macos_app.sh
          ./scripts/build_macos_app.sh

      - name: Compress app artifact
        run: |
          cd dist/macos-app
          ditto -c -k --sequesterRsrc --keepParent mail_summariser.app mail_summariser-macos-app.zip

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist/macos-app/mail_summariser-macos-app.zip

  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - build-backend
      - build-macos-app
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Collect release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-bundle
          cp "$(find release-assets -type f -name 'mail-summariser-backend-macos-arm64' | head -n1)" release-bundle/
          cp "$(find release-assets -type f -name 'mail-summariser-backend-macos-arm64.tar.gz' | head -n1)" release-bundle/
          cp "$(find release-assets -type f -name 'mail-summariser-backend-linux-x64' | head -n1)" release-bundle/
          cp "$(find release-assets -type f -name 'mail-summariser-backend-linux-x64.tar.gz' | head -n1)" release-bundle/
          cp "$(find release-assets -type f -name 'mail-summariser-backend-windows-x64.exe' | head -n1)" release-bundle/
          cp "$(find release-assets -type f -name 'mail-summariser-backend-windows-x64.zip' | head -n1)" release-bundle/
          cp "$(find release-assets -type f -name 'mail_summariser-macos-app.zip' | head -n1)" release-bundle/

      - name: Generate checksums
        run: |
          cd release-bundle
          find . -type f -print0 | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-bundle/mail-summariser-backend-macos-arm64
            release-bundle/mail-summariser-backend-macos-arm64.tar.gz
            release-bundle/mail-summariser-backend-linux-x64
            release-bundle/mail-summariser-backend-linux-x64.tar.gz
            release-bundle/mail-summariser-backend-windows-x64.exe
            release-bundle/mail-summariser-backend-windows-x64.zip
            release-bundle/mail_summariser-macos-app.zip
            release-bundle/SHA256SUMS.txt
