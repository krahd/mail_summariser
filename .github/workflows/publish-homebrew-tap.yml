name: Publish Homebrew tap

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-homebrew-tap:
    name: Publish Homebrew formula
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve release tag
        id: release
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          if [[ "${REF_TYPE}" != "tag" ]]; then
            echo "workflow_dispatch runs must target a release tag ref." >&2
            exit 1
          fi
          if [[ "${REF_NAME}" != v* ]]; then
            echo "Release tag must match v*." >&2
            exit 1
          fi

          echo "release_tag=${REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Wait for backend release assets
        id: release-assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          release_url="https://api.github.com/repos/${REPOSITORY}/releases/tags/${RELEASE_TAG}"
          max_attempts=40

          for attempt in $(seq 1 "$max_attempts"); do
            http_status="$(
              curl -sS -o release.json -w "%{http_code}" \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "${release_url}"
            )"

            if [[ "${http_status}" == "200" ]]; then
              if python - release.json "$GITHUB_OUTPUT" <<'PY'
          import json
          import sys
          from pathlib import Path

          release = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          assets = {asset["name"]: asset for asset in release.get("assets", [])}
          required = {
              "mail_summariser-backend-macos-arm64.tar.gz": ("macos_url", "macos_sha256"),
              "mail_summariser-backend-linux-x64.tar.gz": ("linux_url", "linux_sha256"),
          }

          lines: list[str] = []
          for asset_name, (url_key, sha_key) in required.items():
              asset = assets.get(asset_name)
              if asset is None:
                  raise SystemExit(1)

              digest = asset.get("digest", "")
              if not digest.startswith("sha256:"):
                  raise SystemExit(1)

              lines.append(f"{url_key}={asset['browser_download_url']}")
              lines.append(f"{sha_key}={digest.split(':', 1)[1]}")

          with Path(sys.argv[2]).open("a", encoding="utf-8") as output_file:
              output_file.write("\n".join(lines) + "\n")
          PY
              then
                exit 0
              fi
            elif [[ "${http_status}" != "404" ]]; then
              echo "Unexpected GitHub API response while fetching release metadata: ${http_status}" >&2
              cat release.json >&2 || true
              exit 1
            fi

            if [[ "${attempt}" -eq "${max_attempts}" ]]; then
              echo "Timed out waiting for required release assets for ${RELEASE_TAG}." >&2
              exit 1
            fi

            sleep 15
          done

      - name: Clone tap repository
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/krahd/homebrew-tap.git" tap-repo

      - name: Configure tap git author
        working-directory: tap-repo
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Render formula
        shell: bash
        env:
          LINUX_SHA256: ${{ steps.release-assets.outputs.linux_sha256 }}
          LINUX_URL: ${{ steps.release-assets.outputs.linux_url }}
          MACOS_SHA256: ${{ steps.release-assets.outputs.macos_sha256 }}
          MACOS_URL: ${{ steps.release-assets.outputs.macos_url }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p tap-repo/Formula
          python render_homebrew_formula.py \
            --release-tag "${RELEASE_TAG}" \
            --macos-url "${MACOS_URL}" \
            --macos-sha256 "${MACOS_SHA256}" \
            --linux-url "${LINUX_URL}" \
            --linux-sha256 "${LINUX_SHA256}" \
            --output tap-repo/Formula/mail_summariser.rb

      - name: Commit and push formula update
        working-directory: tap-repo
        shell: bash
        env:
          FORMULA_NAME: mail_summariser
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          set -euo pipefail

          legacy_formula_name="${FORMULA_NAME//_/-}"

          if git ls-files --error-unmatch "Formula/${FORMULA_NAME}.rb" >/dev/null 2>&1; then
            if git diff --quiet -- "Formula/${FORMULA_NAME}.rb" && ([[ "${legacy_formula_name}" == "${FORMULA_NAME}" ]] || ! git ls-files --error-unmatch "Formula/${legacy_formula_name}.rb" >/dev/null 2>&1); then
              echo "Formula already up to date."
              exit 0
            fi
          fi

          if [[ "${legacy_formula_name}" != "${FORMULA_NAME}" ]] && git ls-files --error-unmatch "Formula/${legacy_formula_name}.rb" >/dev/null 2>&1; then
            git rm -f "Formula/${legacy_formula_name}.rb"
          fi

          git add "Formula/${FORMULA_NAME}.rb"
          git commit -m "Update ${FORMULA_NAME} formula for ${RELEASE_TAG}"

          max_attempts=5
          for attempt in $(seq 1 "$max_attempts"); do
            if ! git pull --rebase origin main; then
              echo "Rebase failed while preparing the tap update." >&2
              git rebase --abort || true
              exit 1
            fi

            if git push origin HEAD:main; then
              exit 0
            fi
          done

          exit 1